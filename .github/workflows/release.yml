    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Download CLI bundle
        uses: actions/download-artifact@v4
        with: { name: cli-bundle, path: . }
      - run: tar -xzf cli-bundle.tar.gz

      - name: Download icons
        uses: actions/download-artifact@v4
        with: { name: icons, path: build }
        continue-on-error: true

      - name: Prepare Electron resources
        run: |
          mkdir -p electron/resources/node electron/resources/cli

          VER="${PORTABLE_NODE_VERSION}"
          curl -fsSL "https://nodejs.org/dist/v$VER/node-v$VER-darwin-arm64.tar.gz" -o node.tar.gz
          tar -xzf node.tar.gz
          cp -R "node-v$VER-darwin-arm64/." electron/resources/node/

          cp cli/cli.js electron/resources/cli/
          cp cli/package.json electron/resources/cli/
          cp -R cli/app electron/resources/cli/app
          [ -d cli/node_modules ] && cp -R cli/node_modules electron/resources/cli/node_modules || true

