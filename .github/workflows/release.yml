name: Release Desktop Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.4). Leave empty to use commit SHA."
        required: false
        default: ""

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  APP_NAME: "One"
  PORTABLE_NODE_VERSION: "20.18.1"

jobs:
  # =====================================================================
  # 1. 公共预备：构建 Next.js 独立产物 + CLI 包（cli/app/）
  #    把产物作为 artifact 上传，给两个平台 job 共用，避免重复构建
  # =====================================================================
  build-cli:
    name: Build CLI bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts || npm install --no-audit --no-fund --ignore-scripts

      - name: Install CLI dependencies
        run: npm install --no-audit --no-fund --ignore-scripts
        working-directory: cli

      - name: Build CLI (Next.js standalone + bundled app)
        run: node scripts/build-cli.js
        working-directory: cli

      - name: Prune build artifacts
        shell: bash
        run: |
          # 仅保留发布所需的目录
          rm -rf cli/.build-home cli/app/.next-cli-build/cache || true

      - name: Upload CLI bundle
        uses: actions/upload-artifact@v4
        with:
          name: cli-bundle
          path: |
            cli/cli.js
            cli/package.json
            cli/LICENSE
            cli/README.md
            cli/src/**
            cli/hooks/**
            cli/app/**
          if-no-files-found: error
          retention-days: 3

  # =====================================================================
  # 2. Windows x86 (x64)：用便携 Node + pkg 启动器，制作 ZIP + 安装目录
  # =====================================================================
  build-windows:
    name: Build Windows (x64) .exe
    needs: build-cli
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download CLI bundle
        uses: actions/download-artifact@v4
        with:
          name: cli-bundle
          path: cli

      - name: Read app version
        id: ver
        shell: pwsh
        run: |
          $pkg = Get-Content cli/package.json | ConvertFrom-Json
          "version=$($pkg.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download portable Node.js (Windows x64)
        shell: pwsh
        run: |
          $ver = "${{ env.PORTABLE_NODE_VERSION }}"
          $url = "https://nodejs.org/dist/v$ver/node-v$ver-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive node.zip -DestinationPath .
          Rename-Item "node-v$ver-win-x64" "node-portable"

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Compile launcher to .exe
        shell: pwsh
        run: |
          pkg scripts/desktop-launcher.js `
            --targets node20-win-x64 `
            --output "${{ env.APP_NAME }}.exe" `
            --compress GZip

      - name: Assemble release package
        shell: pwsh
        run: |
          $stage = "stage-win"
          New-Item -ItemType Directory -Force -Path "$stage/resources/node" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/resources/cli" | Out-Null

          # 1) 启动器 exe
          Copy-Item "${{ env.APP_NAME }}.exe" "$stage/${{ env.APP_NAME }}.exe"

          # 2) 便携 Node
          Copy-Item -Recurse "node-portable/*" "$stage/resources/node/"

          # 3) CLI bundle（cli/cli.js + app/ + src/ + hooks/ + package.json）
          Copy-Item cli/cli.js "$stage/resources/cli/"
          Copy-Item cli/package.json "$stage/resources/cli/"
          if (Test-Path cli/LICENSE) { Copy-Item cli/LICENSE "$stage/resources/cli/" }
          if (Test-Path cli/README.md) { Copy-Item cli/README.md "$stage/resources/cli/" }
          Copy-Item -Recurse cli/src "$stage/resources/cli/src"
          Copy-Item -Recurse cli/hooks "$stage/resources/cli/hooks"
          Copy-Item -Recurse cli/app "$stage/resources/cli/app"

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $zip = "${{ env.APP_NAME }}-$ver-windows-x64.zip"
          Compress-Archive -Path stage-win/* -DestinationPath $zip -CompressionLevel Optimal
          "asset=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: pack

      # ---------- MSI 安装包 ----------
      - name: Install WiX Toolset v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix --version
          # 安装 UI 扩展（提供 WixUI_InstallDir 向导界面）
          wix extension add -g WixToolset.UI.wixext/4.0.5
          wix extension list -g

      - name: Generate WiX sources (Package.wxs + Files.wxs)
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $appName = "${{ env.APP_NAME }}"

          # ---------- Files.wxs：枚举 stage-win 所有文件生成 Component ----------
          $stageRoot = (Resolve-Path "stage-win").Path
          $files = Get-ChildItem -Path $stageRoot -Recurse -File
          $sb = New-Object System.Text.StringBuilder
          [void]$sb.AppendLine('<?xml version="1.0" encoding="UTF-8"?>')
          [void]$sb.AppendLine('<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">')
          [void]$sb.AppendLine('  <Fragment>')
          [void]$sb.AppendLine('    <ComponentGroup Id="AppFiles" Directory="INSTALLFOLDER">')
          $i = 0
          foreach ($f in $files) {
            $i++
            $rel = $f.FullName.Substring($stageRoot.Length).TrimStart('\','/')
            $subdir = Split-Path $rel -Parent
            $subdirAttr = ""
            if ($subdir -and $subdir -ne "") {
              $subdirAttr = " Subdirectory=`"$subdir`""
            }
            $src = "stage-win\$rel"
            [void]$sb.AppendLine("      <Component Id=`"C$i`" Guid=`"*`"$subdirAttr>")
            [void]$sb.AppendLine("        <File Id=`"F$i`" Source=`"$src`" KeyPath=`"yes`" />")
            [void]$sb.AppendLine("      </Component>")
          }
          [void]$sb.AppendLine('    </ComponentGroup>')
          [void]$sb.AppendLine('  </Fragment>')
          [void]$sb.AppendLine('</Wix>')
          Set-Content -Path Files.wxs -Value $sb.ToString() -Encoding UTF8
          Write-Host "Generated Files.wxs with $i components"

          # ---------- Package.wxs：主包描述 ----------
          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs"
               xmlns:ui="http://wixtoolset.org/schemas/v4/wxs/ui">
            <Package Name="$appName"
                     Manufacturer="$appName Project"
                     Version="$ver"
                     UpgradeCode="6F2B3C5E-9A8D-4E7B-9C1F-0123456789AB"
                     Scope="perMachine"
                     Compressed="yes"
                     InstallerVersion="500">
              <SummaryInformation Description="$appName Installer" />
              <MajorUpgrade DowngradeErrorMessage="A newer version of $appName is already installed." />
              <MediaTemplate EmbedCab="yes" CompressionLevel="high" />

              <!-- WixUI_InstallDir 向导：欢迎 → 许可 → 选路径 → 安装 → 完成 -->
              <ui:WixUI Id="WixUI_InstallDir" InstallDirectory="INSTALLFOLDER" />
              <UIRef Id="WixUI_ErrorProgressText" />

              <!-- "程序和功能" 元数据 -->
              <Property Id="ARPCONTACT" Value="$appName Project" />
              <Property Id="ARPHELPLINK" Value="https://github.com/${{ github.repository }}" />
              <Property Id="ARPURLINFOABOUT" Value="https://github.com/${{ github.repository }}" />
              <!-- 注意：ARPNOMODIFY / ARPNOREPAIR 已由 WixUI_InstallDir 内部定义，不能重复 -->

              <StandardDirectory Id="ProgramFiles64Folder">
                <Directory Id="INSTALLFOLDER" Name="$appName" />
              </StandardDirectory>

              <!-- 开始菜单快捷方式 -->
              <StandardDirectory Id="ProgramMenuFolder">
                <Directory Id="AppShortcutFolder" Name="$appName">
                  <Component Id="AppShortcut" Guid="7A1D9F2E-3B4C-4A5D-8E6F-AABBCCDDEEFF">
                    <Shortcut Id="AppStartMenuShortcut"
                              Name="$appName"
                              Description="Launch $appName"
                              Target="[INSTALLFOLDER]$appName.exe"
                              WorkingDirectory="INSTALLFOLDER" />
                    <RemoveFolder Id="RemoveAppShortcutFolder" On="uninstall" />
                    <RegistryValue Root="HKCU"
                                   Key="Software\$appName"
                                   Name="installed"
                                   Type="integer" Value="1" KeyPath="yes" />
                  </Component>
                </Directory>
              </StandardDirectory>

              <!-- 桌面快捷方式 -->
              <StandardDirectory Id="DesktopFolder">
                <Component Id="DesktopShortcut" Guid="3D8B4F1A-5C2E-4B7D-9F8E-CCDDEEFF1122">
                  <Shortcut Id="AppDesktopShortcut"
                            Name="$appName"
                            Description="Launch $appName"
                            Target="[INSTALLFOLDER]$appName.exe"
                            WorkingDirectory="INSTALLFOLDER" />
                  <RegistryValue Root="HKCU"
                                 Key="Software\$appName"
                                 Name="desktop"
                                 Type="integer" Value="1" KeyPath="yes" />
                </Component>
              </StandardDirectory>

              <Feature Id="Main" Title="$appName Core" Level="1" AllowAdvertise="no" Display="expand">
                <ComponentGroupRef Id="AppFiles" />
                <ComponentRef Id="AppShortcut" />
                <ComponentRef Id="DesktopShortcut" />
              </Feature>
            </Package>
          </Wix>
          "@
          Set-Content -Path Package.wxs -Value $wxs -Encoding UTF8

      - name: Build MSI
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $msi = "${{ env.APP_NAME }}-$ver-windows-x64.msi"
          wix build -arch x64 -ext WixToolset.UI.wixext -out $msi Package.wxs Files.wxs
          if (!(Test-Path $msi)) { throw "MSI build failed: $msi not produced" }
          $info = Get-Item $msi
          Write-Host "✅ MSI built: $($info.Name)  $([math]::Round($info.Length/1MB,2)) MB"

          # 诊断：MSI 内部文件清单 + stage-win 原始大小对比
          $stageBytes = (Get-ChildItem -Recurse -File stage-win | Measure-Object -Property Length -Sum).Sum
          $stageCount = (Get-ChildItem -Recurse -File stage-win).Count
          Write-Host "📊 stage-win 原始大小：$([math]::Round($stageBytes/1MB,2)) MB （$stageCount 个文件）"
          Write-Host "📊 MSI 压缩后：$([math]::Round($info.Length/1MB,2)) MB"
          Write-Host "📊 压缩率：$([math]::Round($info.Length / $stageBytes * 100, 1))%"

          # 验证 Files.wxs 中 Component 数量与 stage-win 文件数一致
          $componentCount = (Select-String -Path Files.wxs -Pattern '<Component Id="C\d+').Count
          Write-Host "📊 Files.wxs 中 Component 数：$componentCount"
          if ($componentCount -ne $stageCount) {
            Write-Warning "⚠️ Component 数与文件数不一致！可能有文件漏打包"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            ${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-windows-x64.zip
            ${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-windows-x64.msi
          if-no-files-found: error

  # =====================================================================
  # 3. macOS ARM (Apple Silicon)：.app bundle + .dmg
  # =====================================================================
  build-macos:
    name: Build macOS (ARM64) .dmg
    needs: build-cli
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download CLI bundle
        uses: actions/download-artifact@v4
        with:
          name: cli-bundle
          path: cli

      - name: Read app version
        id: ver
        run: |
          VER=$(node -p "require('./cli/package.json').version")
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Download portable Node.js (macOS arm64)
        run: |
          VER="${{ env.PORTABLE_NODE_VERSION }}"
          curl -fsSLO "https://nodejs.org/dist/v$VER/node-v$VER-darwin-arm64.tar.gz"
          tar -xzf "node-v$VER-darwin-arm64.tar.gz"
          mv "node-v$VER-darwin-arm64" node-portable

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Compile launcher (macOS arm64)
        run: |
          pkg scripts/desktop-launcher.js \
            --targets node20-macos-arm64 \
            --output "${{ env.APP_NAME }}" \
            --compress GZip

      - name: Assemble .app bundle
        run: |
          APP="${{ env.APP_NAME }}.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/one/node"
          mkdir -p "$APP/Contents/Resources/one/cli"

          # 启动器
          mv "${{ env.APP_NAME }}" "$APP/Contents/MacOS/${{ env.APP_NAME }}"
          chmod +x "$APP/Contents/MacOS/${{ env.APP_NAME }}"

          # 便携 Node
          cp -R node-portable/. "$APP/Contents/Resources/one/node/"

          # CLI bundle
          cp cli/cli.js "$APP/Contents/Resources/one/cli/"
          cp cli/package.json "$APP/Contents/Resources/one/cli/"
          [ -f cli/LICENSE ] && cp cli/LICENSE "$APP/Contents/Resources/one/cli/" || true
          [ -f cli/README.md ] && cp cli/README.md "$APP/Contents/Resources/one/cli/" || true
          cp -R cli/src "$APP/Contents/Resources/one/cli/src"
          cp -R cli/hooks "$APP/Contents/Resources/one/cli/hooks"
          cp -R cli/app "$APP/Contents/Resources/one/cli/app"

          # Info.plist
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>${{ env.APP_NAME }}</string>
            <key>CFBundleDisplayName</key><string>${{ env.APP_NAME }}</string>
            <key>CFBundleIdentifier</key><string>com.one.desktop</string>
            <key>CFBundleVersion</key><string>${{ steps.ver.outputs.version }}</string>
            <key>CFBundleShortVersionString</key><string>${{ steps.ver.outputs.version }}</string>
            <key>CFBundleExecutable</key><string>${{ env.APP_NAME }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>LSUIElement</key><false/>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Ad-hoc codesign .app
        run: |
          # 自签名，避免 Gatekeeper 直接拒绝；用户首次运行仍需右键打开
          codesign --force --deep --sign - "${{ env.APP_NAME }}.app"
          codesign --verify --verbose=2 "${{ env.APP_NAME }}.app" || echo "⚠️ codesign verify reported issues"

      # =================================================================
      # 🔥 macOS 端到端验证：真正启动 Next.js server + HTTP curl + 截图
      # =================================================================
      - name: 🔥 macOS E2E HTTP smoke test
        id: e2e
        run: |
          set +e
          APP_BIN="${{ env.APP_NAME }}.app/Contents/MacOS/${{ env.APP_NAME }}"
          PORT=20128
          LOG="$RUNNER_TEMP/server.log"
          mkdir -p "$RUNNER_TEMP/verify"

          echo "▶️ 后台启动 $APP_BIN ..."
          # 用 BSD `script` 分配伪 TTY，避免 CLI 检测到非 TTY 自动进入 tray 模式
          # （tray 模式在 GitHub macOS runner 无 GUI session 上会立即失败）
          # macOS 的 script 语法：script -q /dev/null <cmd...>
          script -q /dev/null "$APP_BIN" --log --port $PORT > "$LOG" 2>&1 &
          PID=$!
          echo "启动 PID=$PID"

          echo "⏳ 轮询端口 $PORT（最多 120s）..."
          UP=0
          for i in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:$PORT/" -o /dev/null 2>/dev/null; then
              echo "✅ Server up after ${i}s"
              UP=1
              break
            fi
            # 进程提前死亡 → 立即失败
            if ! kill -0 $PID 2>/dev/null; then
              echo "❌ Launcher 进程提前退出"
              break
            fi
            sleep 1
          done

          if [ "$UP" != "1" ]; then
            echo "❌ HTTP 端点超时未就绪"
            echo "---- 服务日志（后 200 行）----"
            tail -200 "$LOG" || true
            cp "$LOG" "$RUNNER_TEMP/verify/server.log" 2>/dev/null || true
            screencapture -x -t png "$RUNNER_TEMP/verify/00-failed.png" 2>/dev/null || true
            kill $PID 2>/dev/null
            pkill -f "${{ env.APP_NAME }}.app" 2>/dev/null || true
            exit 1
          fi

          echo "🔎 校验关键路由"
          set -e
          curl -fsS -o "$RUNNER_TEMP/verify/home.html"      -w "GET /            → HTTP %{http_code}  (%{size_download} bytes)\n" "http://127.0.0.1:$PORT/"
          curl -fsS -o "$RUNNER_TEMP/verify/dashboard.html" -w "GET /dashboard   → HTTP %{http_code}  (%{size_download} bytes)\n" "http://127.0.0.1:$PORT/dashboard" || echo "⚠️ /dashboard 非 2xx"
          curl -fsS -o "$RUNNER_TEMP/verify/favicon.svg"    -w "GET /favicon.svg → HTTP %{http_code}\n" "http://127.0.0.1:$PORT/favicon.svg" || true
          set +e

          echo "📸 截图：服务运行中的桌面"
          screencapture -x -t png "$RUNNER_TEMP/verify/01-desktop.png" || true

          # 用 open 模拟 Finder 双击，让 Dock 出现图标
          open -ga "${{ env.APP_NAME }}.app" 2>/dev/null || true
          sleep 3
          screencapture -x -t png "$RUNNER_TEMP/verify/02-after-open.png" || true

          echo "---- 服务日志（后 60 行）----"
          tail -60 "$LOG" || true
          cp "$LOG" "$RUNNER_TEMP/verify/server.log" || true

          echo "🧹 优雅退出"
          kill $PID 2>/dev/null
          for i in 1 2 3 4 5; do
            kill -0 $PID 2>/dev/null || break
            sleep 1
          done
          kill -9 $PID 2>/dev/null || true
          pkill -f "${{ env.APP_NAME }}.app" 2>/dev/null || true

          echo "✅ E2E smoke test 通过"

      - name: Build .dmg
        run: |
          VER="${{ steps.ver.outputs.version }}"
          DMG="${{ env.APP_NAME }}-$VER-macos-arm64.dmg"
          STAGE=dmg-stage
          mkdir -p "$STAGE"
          cp -R "${{ env.APP_NAME }}.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "${{ env.APP_NAME }}" \
            -srcfolder "$STAGE" \
            -ov -format ULFO \
            "$DMG"

      - name: 🔍 Verify .dmg by mounting
        run: |
          VER="${{ steps.ver.outputs.version }}"
          DMG="${{ env.APP_NAME }}-$VER-macos-arm64.dmg"
          MOUNTPOINT=$(hdiutil attach "$DMG" -nobrowse -readonly | tail -1 | awk '{print $3}')
          echo "Mounted at: $MOUNTPOINT"
          ls -la "$MOUNTPOINT"
          test -d "$MOUNTPOINT/${{ env.APP_NAME }}.app" || { echo "❌ .app missing inside DMG"; hdiutil detach "$MOUNTPOINT"; exit 1; }
          # 验证签名链
          codesign --verify --verbose=2 "$MOUNTPOINT/${{ env.APP_NAME }}.app" || echo "⚠️ signature verify reported issues"
          # 关键文件存在性
          for f in "Contents/MacOS/${{ env.APP_NAME }}" "Contents/Info.plist" "Contents/Resources/one/cli/cli.js" "Contents/Resources/one/cli/app/server.js" "Contents/Resources/one/node/bin/node"; do
            test -e "$MOUNTPOINT/${{ env.APP_NAME }}.app/$f" && echo "✅ $f" || { echo "❌ Missing: $f"; hdiutil detach "$MOUNTPOINT"; exit 1; }
          done
          hdiutil detach "$MOUNTPOINT"
          echo "✅ DMG 内部结构校验通过"

      - name: 📸 Upload macOS verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-verification-${{ steps.ver.outputs.version }}
          path: ${{ runner.temp }}/verify/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: "${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-macos-arm64.dmg"
          if-no-files-found: error

  # =====================================================================
  # 4. 创建/更新 GitHub Release，附带两份产物
  # =====================================================================
  release:
    name: Publish Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dist

      - name: List artifacts
        run: ls -lah dist

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.msi
            dist/*.dmg
