  release:
    name: Publish Release
    needs: [build-windows-light, build-macos-light, build-windows-tauri, build-macos-tauri, build-windows-electron, build-macos-electron]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: |
          echo "📦 All artifacts:"
          ls -laR windows-x64/ macos-arm64/ windows-tauri/ macos-tauri/ windows-electron/ macos-electron/ 2>/dev/null || true

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 📦 Download

            ### 🔰 Lightweight (Recommended)
            - **Windows**: `One-v*.x-windows-x64.msi` (Installer) or `.zip` (Portable)
            - **macOS**: `One-v*.x-macos-arm64.dmg`

            ### ⚡ Tauri (Native, smaller)
            - **Windows**: `windows-tauri/*.msi`
            - **macOS**: `macos-tauri/*.dmg`

            ### 🖥️ Electron (Better compatibility)
            - **Windows**: `windows-electron/*.msi`
            - **macOS**: `macos-electron/*.dmg`
          files: |
            windows-x64/*.zip
            windows-x64/*.msi
            macos-arm64/*.dmg
            windows-tauri/*.msi
            macos-tauri/*.dmg
            windows-electron/*.msi
            macos-electron/*.dmg
