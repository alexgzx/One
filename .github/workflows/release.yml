name: Release Desktop Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.4). Leave empty to use commit SHA."
        required: false
        default: ""

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  APP_NAME: "One"
  PORTABLE_NODE_VERSION: "20.18.1"

jobs:
  # =====================================================================
  # 1. 公共预备：构建 Next.js + CLI bundle
  # =====================================================================
  build-cli:
    name: Build CLI bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts || npm install --no-audit --no-fund --ignore-scripts

      - name: Install CLI dependencies
        run: npm install --no-audit --no-fund --ignore-scripts
        working-directory: cli

      - name: Build CLI (Next.js standalone + bundled app)
        run: node scripts/build-cli.js
        working-directory: cli

      - name: Generate custom purple cloud icons
        shell: bash
        run: |
          set -e
          echo "🎨 生成紫色云朵图标..."
          npm install --no-save --no-audit --no-fund sharp@^0.33 png-to-ico@^2 2>&1 | tail -3
          
          # 用 Node.js 直接生成 SVG（避免 YAML heredoc 语法问题）
          node -e "
            const fs = require('fs');
            const svg = \`<svg width=\"1024\" height=\"1024\" viewBox=\"0 0 1024 1024\" xmlns=\"http://www.w3.org/2000/svg\">
              <circle cx=\"512\" cy=\"512\" r=\"480\" fill=\"#8B5CF6\"/>
              <circle cx=\"512\" cy=\"512\" r=\"480\" fill=\"url(#grad)\" opacity=\"0.3\"/>
              <path d=\"M 320 420 C 250 420 190 480 190 560 C 190 630 250 680 330 690 L 330 710 C 330 780 400 830 480 830 C 540 830 590 790 610 740 C 630 750 650 750 670 750 C 740 750 800 690 800 620 C 800 550 740 490 670 490 L 670 470 C 670 400 600 350 530 350 C 480 350 440 380 420 410 C 390 410 360 420 340 420 Z\" fill=\"white\"/>
              <defs>
                <radialGradient id=\"grad\" cx=\"50%\" cy=\"30%\" r=\"70%\">
                  <stop offset=\"0%\" stop-color=\"#A78BFA\"/>
                  <stop offset=\"100%\" stop-color=\"#5B21B6\"/>
                </radialGradient>
              </defs>
            </svg>\`;
            fs.writeFileSync('/tmp/icon.svg', svg);
            console.log('✅ SVG saved');
          "

          # 生成各种尺寸图标
          node -e "
            const sharp = require('sharp');
            const pngToIco = require('png-to-ico');
            const fs = require('fs');
            const path = require('path');
            const svg = fs.readFileSync('/tmp/icon.svg');
            
            const trayDir = 'cli/src/cli/tray';
            const buildDir = 'build';
            
            [trayDir, buildDir].forEach(dir => {
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            });

            (async () => {
              const sizes = [16, 32, 48, 64, 128, 256, 512, 1024];
              for (const s of sizes) {
                await sharp(svg, { density: 384 })
                  .resize(s, s, { fit: 'contain', background: { r:0, g:0, b:0, alpha:0 } })
                  .png()
                  .toFile(path.join(buildDir, 'icon-' + s + 'x' + s + '.png'));
              }
              
              await sharp(svg, { density: 384 })
                .resize(256, 256, { fit: 'contain', background: { r:0, g:0, b:0, alpha:0 } })
                .png()
                .toFile(path.join(trayDir, 'icon.png'));
              await sharp(svg, { density: 384 })
                .resize(256, 256, { fit: 'contain', background: { r:0, g:0, b:0, alpha:0 } })
                .png()
                .toFile(path.join(buildDir, 'icon.png'));
              console.log('✅ Generated icon.png');

              const icoSizes = [16, 32, 48, 64, 256];
              const files = [];
              for (const s of icoSizes) {
                files.push(path.join(buildDir, 'icon-' + s + 'x' + s + '.png'));
              }
              const ico = await pngToIco(files);
              fs.writeFileSync(path.join(trayDir, 'icon.ico'), ico);
              fs.writeFileSync(path.join(buildDir, 'icon.ico'), ico);
              console.log('✅ Generated icon.ico');
            })();
          "
          ls -la cli/src/cli/tray/icon.* build/icon.*
          test -s cli/src/cli/tray/icon.png && echo "✅ icon.png ok"
          test -s cli/src/cli/tray/icon.ico && echo "✅ icon.ico ok"

      - name: Ensure SQLite runtime is bundled (sql.js wasm)
        shell: bash
        run: |
          set -e
          echo "📦 强制安装 sql.js 到 cli/app/node_modules ..."
          mkdir -p cli/app/node_modules
          cd cli/app
          if [ ! -f package.json ]; then
            echo '{"name":"_bundled","private":true}' > package.json
          fi
          npm install sql.js@latest --no-audit --no-fund --no-save --prefer-online
          cd ../..
          WASM="cli/app/node_modules/sql.js/dist/sql-wasm.wasm"
          if [ ! -f "$WASM" ]; then
            echo "❌ $WASM missing after install"
            ls -la cli/app/node_modules/sql.js/dist/ || true
            exit 1
          fi
          echo "✅ $WASM ($(stat -c%s "$WASM" 2>/dev/null || stat -f%z "$WASM") bytes)"

      - name: Prune build artifacts
        shell: bash
        run: |
          rm -rf cli/.build-home cli/app/.next-cli-build/cache || true

      - name: Pack CLI bundle (preserve dotfiles/dot-dirs)
        shell: bash
        run: |
          set -euo pipefail
          tar -czf cli-bundle.tar.gz \
            cli/cli.js \
            cli/package.json \
            cli/LICENSE \
            cli/README.md \
            cli/src \
            cli/hooks \
            cli/app \
            cli/node_modules
          ls -lh cli-bundle.tar.gz

          tar -tzf cli-bundle.tar.gz > /tmp/tar-list.txt
          echo "📦 tar 包内文件总数：$(wc -l < /tmp/tar-list.txt)"

          echo "🔍 关键文件检查："
          for pat in "BUILD_ID" "node-machine-id/package.json" "sql.js/dist/sql-wasm.wasm"; do
            if grep -q "$pat" /tmp/tar-list.txt; then
              echo "   ✅ $pat"
            else
              echo "   ❌ $pat NOT IN ARCHIVE"
              exit 1
            fi
          done
          echo "✅ 所有关键文件都已打包"

      - name: Upload CLI bundle
        uses: actions/upload-artifact@v4
        with:
          name: cli-bundle
          path: cli-bundle.tar.gz
          if-no-files-found: error
          retention-days: 3

      - name: Upload icons
        uses: actions/upload-artifact@v4
        with:
          name: icons
          path: build/icon-*
          if-no-files-found: warn
          retention-days: 3

  # =====================================================================
  # 2. Windows x64 (轻量版)：便携 Node + pkg launcher
  # =====================================================================
  build-windows-light:
    name: Build Windows (x64) Lightweight
    needs: build-cli
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download CLI bundle
        uses: actions/download-artifact@v4
        with:
          name: cli-bundle
          path: .

      - name: Extract CLI bundle
        shell: bash
        run: |
          tar -xzf cli-bundle.tar.gz
          ls -la cli/
          test -f cli/app/.next-cli-build/BUILD_ID && echo "✅ BUILD_ID present" || { echo "❌ BUILD_ID missing"; exit 1; }
          test -f cli/app/node_modules/sql.js/dist/sql-wasm.wasm && echo "✅ sql-wasm.wasm present" || { echo "❌ sql-wasm.wasm missing"; exit 1; }

      - name: Read app version
        id: ver
        shell: pwsh
        run: |
          $pkg = Get-Content cli/package.json | ConvertFrom-Json
          "version=$($pkg.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download portable Node.js (Windows x64)
        shell: pwsh
        run: |
          $ver = "${{ env.PORTABLE_NODE_VERSION }}"
          $url = "https://nodejs.org/dist/v$ver/node-v$ver-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive node.zip -DestinationPath .
          Rename-Item "node-v$ver-win-x64" "node-portable"

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Compile launcher to .exe
        shell: pwsh
        run: |
          pkg scripts/desktop-launcher.js `
            --targets node20-win-x64 `
            --output "${{ env.APP_NAME }}.exe" `
            --compress GZip

      - name: Assemble release package
        shell: pwsh
        run: |
          $stage = "stage-win"
          New-Item -ItemType Directory -Force -Path "$stage/resources/node" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/resources/cli" | Out-Null

          Copy-Item "${{ env.APP_NAME }}.exe" "$stage/${{ env.APP_NAME }}.exe"
          Copy-Item -Recurse "node-portable/*" "$stage/resources/node/"
          Copy-Item cli/cli.js "$stage/resources/cli/"
          Copy-Item cli/package.json "$stage/resources/cli/"
          if (Test-Path cli/LICENSE) { Copy-Item cli/LICENSE "$stage/resources/cli/" }
          if (Test-Path cli/README.md) { Copy-Item cli/README.md "$stage/resources/cli/" }
          Copy-Item -Recurse cli/src "$stage/resources/cli/src"
          Copy-Item -Recurse cli/hooks "$stage/resources/cli/hooks"
          Copy-Item -Recurse cli/app "$stage/resources/cli/app"
          if (Test-Path cli/node_modules) {
            Copy-Item -Recurse cli/node_modules "$stage/resources/cli/node_modules"
          }

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $zip = "${{ env.APP_NAME }}-$ver-windows-x64.zip"
          Compress-Archive -Path stage-win/* -DestinationPath $zip -CompressionLevel Optimal
          "asset=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: pack

      - name: 🧪 Windows E2E HTTP smoke test
        shell: bash
        run: |
          set +e
          PORT=20128
          LOG="$RUNNER_TEMP/server.log"
          
          cd stage-win
          # 用脚本启动，等待端口就绪
          ./${{ env.APP_NAME }}.exe --port $PORT > "$LOG" 2>&1 &
          PID=$!
          echo "启动 PID=$PID"
          
          echo "⏳ 轮询端口 $PORT（最多 120s）..."
          UP=0
          for i in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:$PORT/" -o /dev/null 2>/dev/null; then
              echo "✅ Server up after ${i}s"
              UP=1
              break
            fi
            sleep 1
          done
          
          if [ "$UP" != "1" ]; then
            echo "❌ HTTP 端点超时未就绪"
            echo "---- 服务日志（后 200 行）----"
            tail -200 "$LOG" || true
            exit 1
          fi
          
          curl -fsS -o /dev/null "http://127.0.0.1:$PORT/" && echo "✅ / 路由 OK"
          curl -fsS -o /dev/null "http://127.0.0.1:$PORT/dashboard" && echo "✅ /dashboard 路由 OK"
          kill $PID 2>/dev/null || true
          echo "✅ E2E smoke test 通过"

      - name: Install WiX Toolset v4 & Build MSI
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add -g WixToolset.UI.wixext/4.0.5

          $ver = "${{ steps.ver.outputs.version }}"
          $appName = "${{ env.APP_NAME }}"

          # Files component
          $stageRoot = (Resolve-Path "stage-win").Path
          $files = Get-ChildItem -Path $stageRoot -Recurse -File
          $sb = New-Object System.Text.StringBuilder
          [void]$sb.AppendLine('<?xml version="1.0" encoding="UTF-8"?>')
          [void]$sb.AppendLine('<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">')
          [void]$sb.AppendLine('  <Fragment>')
          [void]$sb.AppendLine('    <ComponentGroup Id="AppFiles" Directory="INSTALLFOLDER">')
          $i = 0
          foreach ($f in $files) {
            $i++
            $rel = $f.FullName.Substring($stageRoot.Length).TrimStart('\','/')
            $subdir = Split-Path $rel -Parent
            $subdirAttr = ""
            if ($subdir -and $subdir -ne "") { $subdirAttr = " Subdirectory=`"$subdir`"" }
            $src = "stage-win\$rel"
            [void]$sb.AppendLine("      <Component Id=`"C$i`" Guid=`"*`"$subdirAttr>")
            [void]$sb.AppendLine("        <File Id=`"F$i`" Source=`"$src`" KeyPath=`"yes`" />")
            [void]$sb.AppendLine("      </Component>")
          }
          [void]$sb.AppendLine('    </ComponentGroup>')
          [void]$sb.AppendLine('  </Fragment>')
          [void]$sb.AppendLine('</Wix>')
          Set-Content -Path Files.wxs -Value $sb.ToString() -Encoding UTF8
          Write-Host "Generated Files.wxs with $i components"

          # Package.wxs
          $wxs = @"
<?xml version="1.0" encoding="UTF-8"?>
<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs" xmlns:ui="http://wixtoolset.org/schemas/v4/wxs/ui">
  <Package Name="$appName" Manufacturer="$appName Project" Version="$ver" UpgradeCode="6F2B3C5E-9A8D-4E7B-9C1F-0123456789AB" Scope="perMachine" Compressed="yes" InstallerVersion="500">
    <SummaryInformation Description="$appName Installer" />
    <MajorUpgrade DowngradeErrorMessage="A newer version of $appName is already installed." />
    <MediaTemplate EmbedCab="yes" CompressionLevel="high" />
    <ui:WixUI Id="WixUI_InstallDir" InstallDirectory="INSTALLFOLDER" />
    <UIRef Id="WixUI_ErrorProgressText" />
    <Property Id="ARPCONTACT" Value="$appName Project" />
    <Property Id="ARPHELPLINK" Value="https://github.com/${{ github.repository }}" />
    <Property Id="ARPURLINFOABOUT" Value="https://github.com/${{ github.repository }}" />
    <StandardDirectory Id="ProgramFiles64Folder"><Directory Id="INSTALLFOLDER" Name="$appName" /></StandardDirectory>
    <StandardDirectory Id="ProgramMenuFolder">
      <Directory Id="AppShortcutFolder" Name="$appName">
        <Component Id="AppShortcut" Guid="7A1D9F2E-3B4C-4A5D-8E6F-AABBCCDDEEFF">
          <Shortcut Id="AppStartMenuShortcut" Name="$appName" Description="Launch $appName" Target="[INSTALLFOLDER]$appName.exe" WorkingDirectory="INSTALLFOLDER" />
          <RemoveFolder Id="RemoveAppShortcutFolder" On="uninstall" />
          <RegistryValue Root="HKCU" Key="Software\$appName" Name="installed" Type="integer" Value="1" KeyPath="yes" />
        </Component>
      </Directory>
    </StandardDirectory>
    <StandardDirectory Id="DesktopFolder">
      <Component Id="DesktopShortcut" Guid="3D8B4F1A-5C2E-4B7D-9F8E-CCDDEEFF1122">
        <Shortcut Id="AppDesktopShortcut" Name="$appName" Description="Launch $appName" Target="[INSTALLFOLDER]$appName.exe" WorkingDirectory="INSTALLFOLDER" />
        <RegistryValue Root="HKCU" Key="Software\$appName" Name="desktop" Type="integer" Value="1" KeyPath="yes" />
      </Component>
    </StandardDirectory>
    <Feature Id="Main" Title="$appName Core" Level="1" AllowAdvertise="no" Display="expand">
      <ComponentGroupRef Id="AppFiles" />
      <ComponentRef Id="AppShortcut" />
      <ComponentRef Id="DesktopShortcut" />
    </Feature>
  </Package>
</Wix>
"@
          Set-Content -Path Package.wxs -Value $wxs -Encoding UTF8

          $msi = "${{ env.APP_NAME }}-$ver-windows-x64.msi"
          wix build -arch x64 -ext WixToolset.UI.wixext -out $msi Package.wxs Files.wxs
          if (!(Test-Path $msi)) { throw "MSI build failed: $msi not produced" }
          $info = Get-Item $msi
          Write-Host "✅ MSI built: $($info.Name)  $([math]::Round($info.Length/1MB,2)) MB"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            ${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-windows-x64.zip
            ${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-windows-x64.msi
          if-no-files-found: error

  # =====================================================================
  # 3. macOS ARM (轻量版)
  # =====================================================================
  build-macos-light:
    name: Build macOS (ARM64) Lightweight
    needs: build-cli
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download CLI bundle
        uses: actions/download-artifact@v4
        with:
          name: cli-bundle
          path: .

      - name: Extract CLI bundle
        run: |
          tar -xzf cli-bundle.tar.gz
          ls -la cli/
          test -f cli/app/.next-cli-build/BUILD_ID && echo "✅ BUILD_ID present" || { echo "❌ BUILD_ID missing"; exit 1; }
          test -f cli/app/node_modules/sql.js/dist/sql-wasm.wasm && echo "✅ sql-wasm.wasm present" || { echo "❌ sql-wasm.wasm missing"; exit 1; }

      - name: Read app version
        id: ver
        run: |
          VER=$(node -p "require('./cli/package.json').version")
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Download portable Node.js (macOS arm64)
        run: |
          VER="${PORTABLE_NODE_VERSION}"
          curl -fsSLO "https://nodejs.org/dist/v$VER/node-v$VER-darwin-arm64.tar.gz"
          tar -xzf "node-v$VER-darwin-arm64.tar.gz"
          mv "node-v$VER-darwin-arm64" node-portable

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Compile launcher (macOS arm64)
        run: |
          pkg scripts/desktop-launcher.js \
            --targets node20-macos-arm64 \
            --output "${{ env.APP_NAME }}" \
            --compress GZip

      - name: Assemble .app bundle
        run: |
          APP="${{ env.APP_NAME }}.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/one/node"
          mkdir -p "$APP/Contents/Resources/one/cli"

          mv "${{ env.APP_NAME }}" "$APP/Contents/MacOS/${{ env.APP_NAME }}"
          chmod +x "$APP/Contents/MacOS/${{ env.APP_NAME }}"
          cp -R node-portable/. "$APP/Contents/Resources/one/node/"
          cp cli/cli.js "$APP/Contents/Resources/one/cli/"
          cp cli/package.json "$APP/Contents/Resources/one/cli/"
          [ -f cli/LICENSE ] && cp cli/LICENSE "$APP/Contents/Resources/one/cli/" || true
          [ -f cli/README.md ] && cp cli/README.md "$APP/Contents/Resources/one/cli/" || true
          cp -R cli/src "$APP/Contents/Resources/one/cli/src"
          cp -R cli/hooks "$APP/Contents/Resources/one/cli/hooks"
          cp -R cli/app "$APP/Contents/Resources/one/cli/app"
          [ -d cli/node_modules ] && cp -R cli/node_modules "$APP/Contents/Resources/one/cli/node_modules" || true

          cat > "$APP/Contents/Info.plist" <<PLIST
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleName</key><string>${{ env.APP_NAME }}</string>
  <key>CFBundleDisplayName</key><string>${{ env.APP_NAME }}</string>
  <key>CFBundleIdentifier</key><string>com.one.desktop</string>
  <key>CFBundleVersion</key><string>${{ steps.ver.outputs.version }}</string>
  <key>CFBundleShortVersionString</key><string>${{ steps.ver.outputs.version }}</string>
  <key>CFBundleExecutable</key><string>${{ env.APP_NAME }}</string>
  <key>CFBundlePackageType</key><string>APPL</string>
  <key>LSMinimumSystemVersion</key><string>11.0</string>
  <key>NSHighResolutionCapable</key><true/>
</dict>
</plist>
PLIST

      - name: Ad-hoc codesign .app
        run: |
          codesign --force --deep --sign - "${{ env.APP_NAME }}.app"
          codesign --verify --verbose=2 "${{ env.APP_NAME }}.app" || echo "⚠️ codesign verify reported issues"

      - name: 🧪 macOS E2E HTTP smoke test
        run: |
          set +e
          APP_BIN="${{ env.APP_NAME }}.app/Contents/MacOS/${{ env.APP_NAME }}"
          PORT=20128
          LOG="$RUNNER_TEMP/server.log"
          mkdir -p "$RUNNER_TEMP/verify"

          script -q /dev/null "$APP_BIN" --log --port $PORT > "$LOG" 2>&1 &
          PID=$!
          echo "启动 PID=$PID"

          echo "⏳ 轮询端口 $PORT（最多 120s）..."
          UP=0
          for i in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:$PORT/" -o /dev/null 2>/dev/null; then
              echo "✅ Server up after ${i}s"
              UP=1
              break
            fi
            if ! kill -0 $PID 2>/dev/null; then
              echo "❌ Launcher 进程提前退出"
              break
            fi
            sleep 1
          done

          if [ "$UP" != "1" ]; then
            echo "❌ HTTP 端点超时未就绪"
            echo "---- 服务日志（后 200 行）----"
            tail -200 "$LOG" || true
            exit 1
          fi

          curl -fsS -o /dev/null "http://127.0.0.1:$PORT/" && echo "✅ / 路由 OK"
          curl -fsS -o /dev/null "http://127.0.0.1:$PORT/dashboard" && echo "✅ /dashboard 路由 OK"
          kill $PID 2>/dev/null || true
          pkill -f "${{ env.APP_NAME }}.app" 2>/dev/null || true
          echo "✅ E2E smoke test 通过"

      - name: Build .dmg
        run: |
          VER="${{ steps.ver.outputs.version }}"
          DMG="${{ env.APP_NAME }}-$VER-macos-arm64.dmg"
          STAGE=dmg-stage
          mkdir -p "$STAGE"
          cp -R "${{ env.APP_NAME }}.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "${{ env.APP_NAME }}" \
            -srcfolder "$STAGE" \
            -ov -format ULFO \
            "$DMG"

      - name: 🔍 Verify .dmg by mounting
        run: |
          VER="${{ steps.ver.outputs.version }}"
          DMG="${{ env.APP_NAME }}-$VER-macos-arm64.dmg"
          MOUNTPOINT=$(hdiutil attach "$DMG" -nobrowse -readonly | tail -1 | awk '{print $3}')
          echo "Mounted at: $MOUNTPOINT"
          test -d "$MOUNTPOINT/${{ env.APP_NAME }}.app" || { echo "❌ .app missing inside DMG"; hdiutil detach "$MOUNTPOINT"; exit 1; }
          hdiutil detach "$MOUNTPOINT"
          echo "✅ DMG 内部结构校验通过"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: "${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-macos-arm64.dmg"
          if-no-files-found: error

  # =====================================================================
  # 4. Tauri 版本 Windows
  # =====================================================================
  build-windows-tauri:
    name: Build Windows (x64) Tauri
    needs: build-cli
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Download CLI bundle
        uses: actions/download-artifact@v4
        with: { name: cli-bundle, path: . }
      - run: tar -xzf cli-bundle.tar.gz

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare Tauri resources
        shell: bash
        run: |
          mkdir -p src-tauri/resources/node src-tauri/resources/cli
          
          # 下载便携 Node
          VER="${{ env.PORTABLE_NODE_VERSION }}"
          curl -fsSL "https://nodejs.org/dist/v$VER/node-v$VER-win-x64.zip" -o node.zip
          powershell -command "Expand-Archive node.zip -DestinationPath ."
          mv "node-v$VER-win-x64"/* src-tauri/resources/node/
          
          # 复制 CLI bundle
          cp cli/cli.js src-tauri/resources/cli/
          cp cli/package.json src-tauri/resources/cli/
          cp -R cli/app src-tauri/resources/cli/app
          [ -d cli/node_modules ] && cp -R cli/node_modules src-tauri/resources/cli/node_modules || true

      - name: Build Tauri MSI
        run: |
          cd src-tauri
          npm install
          cd ..
          npm run tauri build -- --bundles msi

      - name: 🧪 Tauri Windows E2E smoke test
        shell: bash
        run: |
          echo "🧪 Tauri Windows E2E smoke test skipped - need interactive session"
          echo "✅ Tauri build completed successfully"

      - name: Upload Tauri MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  # =====================================================================
  # 5. Tauri 版本 macOS
  # =====================================================================
  build-macos-tauri:
    name: Build macOS (ARM64) Tauri
    needs: build-cli
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Download CLI bundle
        uses: actions/download-artifact@v4
        with: { name: cli-bundle, path: . }
      - run: tar -xzf cli-bundle.tar.gz

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare Tauri resources
        run: |
          mkdir -p src-tauri/resources/node src-tauri/resources/cli
          
          VER="${PORTABLE_NODE_VERSION}"
          curl -fsSL "https://nodejs.org/dist/v$VER/node-v$VER-darwin-arm64.tar.gz" -o node.tar.gz
          tar -xzf node.tar.gz
          mv "node-v$VER-darwin-arm64"/* src-tauri/resources/node/
          
          cp cli/cli.js src-tauri/resources/cli/
          cp cli/package.json src-tauri/resources/cli/
          cp -R cli/app src-tauri/resources/cli/app
          [ -d cli/node_modules ] && cp -R cli/node_modules src-tauri/resources/cli/node_modules || true

      - name: Build Tauri DMG
        run: |
          cd src-tauri
          npm install 2>/dev/null || true
          cd ..
          npm run tauri build -- --bundles dmg

      - name: 🧪 Tauri macOS E2E smoke test
        run: |
          set +e
          APP_PATH="src-tauri/target/release/bundle/macos/${{ env.APP_NAME }}.app"
          PORT=20128
          
          if [ -d "$APP_PATH" ]; then
            echo "✅ Tauri .app bundle built successfully"
            ls -la "$APP_PATH/Contents/MacOS/"
            echo "🧪 Tauri macOS E2E smoke test (GUI app needs accessibility permissions - skipped)"
            echo "✅ Tauri build completed successfully"
          else
            echo "❌ Tauri app not found"
            exit 1
          fi

      - name: Upload Tauri DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-tauri
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # =====================================================================
  # 6. Electron 版本 Windows
  # =====================================================================
  build-windows-electron:
    name: Build Windows (x64) Electron
    needs: build-cli
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Download CLI bundle
        uses: actions/download-artifact@v4
        with: { name: cli-bundle, path: . }
      - run: tar -xzf cli-bundle.tar.gz

      - name: Prepare Electron resources
        shell: bash
        run: |
          mkdir -p electron/resources/node electron/resources/cli
          
          VER="${{ env.PORTABLE_NODE_VERSION }}"
          curl -fsSL "https://nodejs.org/dist/v$VER/node-v$VER-win-x64.zip" -o node.zip
          powershell -command "Expand-Archive node.zip -DestinationPath ."
          mv "node-v$VER-win-x64"/* electron/resources/node/
          
          cp cli/cli.js electron/resources/cli/
          cp cli/package.json electron/resources/cli/
          cp -R cli/app electron/resources/cli/app
          [ -d cli/node_modules ] && cp -R cli/node_modules electron/resources/cli/node_modules || true

      - name: Build Electron MSI
        run: |
          cd electron
          npm install
          npm run build

      - name: 🧪 Electron Windows E2E smoke test
        shell: bash
        run: |
          echo "🧪 Electron Windows E2E smoke test skipped - need interactive session"
          echo "✅ Electron build completed successfully"

      - name: Upload Electron MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-electron
          path: electron/dist/*.msi
          if-no-files-found: error

  # =====================================================================
  # 7. Electron 版本 macOS
  # =====================================================================
  build-macos-electron:
    name: Build macOS (ARM64) Electron
    needs: build-cli
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Download CLI bundle
        uses: actions/download-artifact@v4
        with: { name: cli-bundle, path: . }
      - run: tar -xzf cli-bundle.tar.gz

      - name: Prepare Electron resources
        run: |
          mkdir -p electron/resources/node electron/resources/cli
          
          VER="${PORTABLE_NODE_VERSION}"
          curl -fsSL "https://nodejs.org/dist/v$VER/node-v$VER-darwin-arm64.tar.gz" -o node.tar.gz
          tar -xzf node.tar.gz
          mv "node-v$VER-darwin-arm64"/* electron/resources/node/
          
          cp cli/cli.js electron/resources/cli/
          cp cli/package.json electron/resources/cli/
          cp -R cli/app electron/resources/cli/app
          [ -d cli/node_modules ] && cp -R cli/node_modules electron/resources/cli/node_modules || true

      - name: Build Electron DMG
        run: |
          cd electron
          npm install
          npm run build

      - name: 🧪 Electron macOS E2E smoke test
        run: |
          set +e
          DMG_FILE=$(ls electron/dist/*.dmg 2>/dev/null | head -1)
          if [ -f "$DMG_FILE" ]; then
            echo "✅ Electron DMG built successfully"
            ls -lh "$DMG_FILE"
            echo "🧪 Electron macOS E2E smoke test skipped - needs GUI session"
          else
            echo "❌ Electron DMG not found"
            ls -la electron/dist/ 2>/dev/null || true
            exit 1
          fi

      - name: Upload Electron DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-electron
          path: electron/dist/*.dmg
          if-no-files-found: error

  # =====================================================================
  # 8. 发布 Release
  # =====================================================================
  release:
    name: Publish Release
    needs: [build-windows-light, build-macos-light, build-windows-tauri, build-macos-tauri, build-windows-electron, build-macos-electron]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: |
          echo "📦 所有产物:"
          ls -laR windows-x64/ macos-arm64/ windows-tauri/ macos-tauri/ windows-electron/ macos-electron/ 2>/dev/null || true

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 📦 下载

            ### 🔰 轻量版（推荐）
            - **Windows**: `One-v*.*.*-windows-x64.msi`（安装版）或 `.zip`（便携版）
            - **macOS**: `One-v*.*.*-macos-arm64.dmg`

            ### ⚡ Tauri 版本（原生体验，更小）
            - **Windows**: `windows-tauri/*.msi`
            - **macOS**: `macos-tauri/*.dmg`

            ### 🖥️ Electron 版本（兼容更好）
            - **Windows**: `windows-electron/*.msi`
            - **macOS**: `macos-electron/*.dmg`
          files: |
            windows-x64/*.zip
            windows-x64/*.msi
            macos-arm64/*.dmg
            windows-tauri/*.msi
            macos-tauri/*.dmg
            windows-electron/*.msi
            macos-electron/*.dmg
